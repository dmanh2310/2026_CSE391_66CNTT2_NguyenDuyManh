<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styleth2b2.css">
</head>
<body>

    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav>
            <ul>
                <li><a href="#">Destinations</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
                <a href="#" class="btn-discover">Discover places</a>
            </div>
        </section>

        <section class="highlights">
            <h2>HIGHLIGHTS</h2>
            <div class="card-container">
                <div class="card">
                    <img src="https://picsum.photos/id/10/300/150" alt="Miami">

                </div>
                <div class="card">
                    <img src="https://picsum.photos/id/20/300/150" alt="Munich">
                    <p>MUNICH <span>GERMANY</span></p>
                </div>
                <div class="card">
                    <img src="https://picsum.photos/id/30/300/150" alt="Barcelona">
                    <p>BARCELONA <span>SPAIN</span></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
        </div>
    </footer>

</body>
</html>
