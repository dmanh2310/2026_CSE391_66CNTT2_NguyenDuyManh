<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleth2b1.css">
</head>
<body>

    <div class="form-outer-border">
        <div class="form-container">
            <h2 class="form-header">Get in touch with us by filling contact form below</h2>
            
            <form>
                <div class="flex-row">
                    <input type="text" placeholder="* Enter your full name" class="flex-item">
                    <input type="email" placeholder="* Enter your email address" class="flex-item">
                </div>

                <div class="full-width">
                    <input type="text" placeholder="Enter your subject">
                </div>

                <div class="full-width">
                    <textarea placeholder="* Your message here..." rows="12"></textarea>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-send">Send message</button>
                    <span class="note">* Please fill all required form field, thanks!</span>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
