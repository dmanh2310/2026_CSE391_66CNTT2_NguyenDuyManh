<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nâng Cấp Form Đăng Ký</title>
    <style>
        :root { --err: #ff4d4d; --mid: #f1c40f; --strong: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 25px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        /* Đếm ký tự */
        .count-wrapper { display: flex; justify-content: space-between; align-items: center; }
        .char-count { font-size: 11px; color: #888; }

        /* Password Toggle */
        .pass-wrapper { position: relative; }
        .toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; }

        /* Strength Bar */
        .strength-container { height: 5px; background: #eee; margin-top: 8px; border-radius: 3px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.3s; }
        .strength-text { font-size: 11px; margin-top: 4px; font-weight: bold; }

        .error-msg { color: var(--err); font-size: 12px; margin-top: 5px; display: block; }
        button { width: 100%; padding: 12px; background: #3498db; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <form id="upgradeForm">
        <h2>Nâng Cấp Đăng Ký</h2>

        <div class="form-group">
            <div class="count-wrapper">
                <label>Họ và tên</label>
                <span class="char-count" id="fullnameCount">0/50</span>
            </div>
            <input type="text" id="fullname" maxlength="50" placeholder="Nhập họ tên...">
            <small class="error-msg" id="fullname-err"></small>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <div class="pass-wrapper">
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <span class="toggle-btn" id="togglePass">👁️</span>
            </div>
            <div class="strength-container">
                <div id="strengthBar" class="strength-bar"></div>
            </div>
            <div id="strengthText" class="strength-text"></div>
            <small class="error-msg" id="password-err"></small>
        </div>

        <button type="submit">Hoàn Tất</button>
    </form>
</div>

<script src="b3.js"></script>
</body>
</html>
