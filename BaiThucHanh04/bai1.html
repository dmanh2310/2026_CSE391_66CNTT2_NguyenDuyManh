<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .input-group { margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f4f4f4; }
    .low-score { background-color: #fff176; } /* Tô nền vàng cho điểm < 5 */
    .stats { margin-top: 15px; font-weight: bold; color: #2c3e50; }
    button.delete-btn { background-color: #ff5252; color: white; border: none; padding: 5px 10px; cursor: pointer; }

</style>

<body>
    <h2> Quản lý điểm sinh viên</h2>

    <div class="input-group">
        <input type="text" id="txtName" placeholder="Nhập họ tên sinh viên">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" step=0,1>
        <button id="btnAdd">thêm</button>
    </div>
    
    <hr> <div class="toolbar" style="margin-bottom: 15px; display: flex; gap: 10px;">
        <input type="text" id="searchName" placeholder="Tìm tên sinh viên..." style="flex: 1; padding: 5px;">
    
            <select id="filterRank" style="padding: 5px;">
                <option value="All">Tất cả xếp loại</option>
                <option value="Giỏi">Giỏi</option>
                <option value="Khá">Khá</option>
                <option value="Trung bình">Trung bình</option>
                <option value="Yếu">Yếu</option>
            </select>
        </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="sortScore" style="cursor: pointer; background-color: #eee;">
                    Điểm <span id="sortIcon">↕</span>
                </th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentBody"></tbody>
    </table>

    <div class="stats" id="idStats">
        Tổng số sinh viên: 0 | Điểm Trung bình: 0.0
    </div>

    <script src="b1.js"></script>
</body>
</html>
