<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập 2 - Multi-step Form</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --gray: #dfe6e9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
        .form-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        
        /* Progress Bar */
        .progress-container { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .progress-container::before { content: ""; background: var(--gray); position: absolute; top: 50%; left: 0; transform: translateY(-50%); height: 4px; width: 100%; z-index: 1; }
        .progress-bar { background: var(--primary); position: absolute; top: 50%; left: 0; transform: translateY(-50%); height: 4px; width: 0%; z-index: 1; transition: 0.4s; }
        .step-circle { width: 30px; height: 30px; background: #fff; border: 3px solid var(--gray); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 2; font-weight: bold; transition: 0.4s; }
        .step-circle.active { border-color: var(--primary); color: var(--primary); }
        .step-circle.completed { border-color: var(--success); background: var(--success); color: #fff; }

        /* Form Steps */
        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .error { color: #e74c3c; font-size: 12px; margin-top: 5px; height: 15px; }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-submit { background: var(--success); color: white; }
        
        .summary-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="form-container">
    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
        <div class="step-circle active" data-title="Cá nhân">1</div>
        <div class="step-circle" data-title="Tài khoản">2</div>
        <div class="step-circle" data-title="Xác nhận">3</div>
    </div>

    <form id="multiStepForm">
        <div class="form-step active">
            <h3>Thông tin cá nhân</h3>
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullname" placeholder="Ít nhất 3 ký tự">
                <div class="error" id="fullname-err"></div>
            </div>
            <div class="form-group">
                <label>Ngày sinh</label>
                <input type="date" id="dob">
                <div class="error" id="dob-err"></div>
            </div>
            <div class="form-group">
                <label>Giới tính</label>
                <select id="gender">
                    <option value="">-- Chọn --</option>
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
                <div class="error" id="gender-err"></div>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-next" onclick="nextStep()">Tiếp theo</button>
            </div>
        </div>

        <div class="form-step">
            <h3>Thông tin tài khoản</h3>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@example.com">
                <div class="error" id="email-err"></div>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password">
                <div class="error" id="password-err"></div>
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPass">
                <div class="error" id="confirmPass-err"></div>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="prevStep()">Quay lại</button>
                <button type="button" class="btn-next" onclick="nextStep()">Tiếp theo</button>
            </div>
        </div>

        <div class="form-step">
            <h3>Xác nhận thông tin</h3>
            <div id="summary" class="summary-box"></div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="prevStep()">Quay lại</button>
                <button type="submit" class="btn-submit">Hoàn tất đăng ký</button>
            </div>
        </div>
    </form>
</div>

<script src="b3v2.js"></script>
</body>
</html>
